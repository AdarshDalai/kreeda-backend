[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
    --durations=10
    --cov=app
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml
markers =
    unit: Unit tests
    integration: Integration tests 
    e2e: End-to-end tests
    slow: marks tests as slow (deselect with '-m "not slow"')
    auth: marks tests related to authentication
    cricket: marks tests related to cricket functionality
    notifications: marks tests related to notifications
    statistics: marks tests related to statistics
    teams: marks tests related to teams
    tournaments: marks tests related to tournaments
    performance: Performance tests
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning