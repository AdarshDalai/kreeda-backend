name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, production-config, develop ]
  pull_request:
    branches: [ main, master, production-config ]
  schedule:
    # Run nightly builds for dependency updates and security scans
    - cron: '0 2 * * *'

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Code Quality and Static Analysis
  code-quality:
    name: Code Quality & Static Analysis
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for better analysis

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install black isort flake8 mypy pylint bandit safety

    - name: Code formatting check (Black)
      run: |
        black --check --diff app/ tests/

    - name: Import sorting check (isort)
      run: |
        isort --check-only --diff --profile black app/ tests/

    - name: Linting (flake8)
      run: |
        flake8 app/ tests/ --count --show-source --statistics
        flake8 app/ tests/ --count --exit-zero --max-complexity=12 --max-line-length=127 --statistics

    - name: Type checking (mypy)
      run: |
        mypy app/ --ignore-missing-imports --no-strict-optional

    - name: Advanced linting (pylint)
      run: |
        pylint app/ --disable=C0111,R0903,W0613 --max-line-length=127

    - name: Security linting (bandit)
      run: |
        bandit -r app/ -f json -o bandit-report.json
        bandit -r app/ --severity-level medium

    - name: Upload code quality reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: code-quality-reports
        path: |
          bandit-report.json

  # Comprehensive Testing Strategy
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: code-quality
    strategy:
      matrix:
        test-type: [unit, integration, api]
        python-version: ['3.11']
      fail-fast: false
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: kreeda_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ matrix.python-version }}-
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio pytest-cov pytest-xdist pytest-timeout

    - name: Set up test environment
      run: |
        cp .env.example .env
        echo "DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:5432/kreeda_test" >> .env
        echo "REDIS_URL=redis://localhost:6379" >> .env
        echo "ENVIRONMENT=testing" >> .env
        echo "DEBUG=false" >> .env

    - name: Wait for services
      run: |
        timeout 60 bash -c 'until pg_isready -h localhost -p 5432; do sleep 1; done'
        timeout 60 bash -c 'until redis-cli -h localhost -p 6379 ping; do sleep 1; done'

    - name: Run Unit Tests
      if: matrix.test-type == 'unit'
      run: |
        pytest tests/test_*.py -v \
          --cov=app \
          --cov-report=xml:coverage-unit.xml \
          --cov-report=html:htmlcov-unit \
          --cov-report=term-missing \
          --maxfail=5 \
          --tb=short \
          -x tests/test_auth.py tests/test_users.py tests/test_user_profile.py \
          --timeout=300

    - name: Run Integration Tests  
      if: matrix.test-type == 'integration'
      run: |
        pytest tests/test_e2e_integration.py tests/test_teams.py tests/test_tournaments.py -v \
          --cov=app \
          --cov-append \
          --cov-report=xml:coverage-integration.xml \
          --cov-report=html:htmlcov-integration \
          --maxfail=3 \
          --tb=short \
          --timeout=600

    - name: Run API Tests
      if: matrix.test-type == 'api'
      run: |
        pytest tests/test_cricket.py tests/test_statistics.py tests/test_stats_api.py tests/test_notifications.py -v \
          --cov=app \
          --cov-append \
          --cov-report=xml:coverage-api.xml \
          --cov-report=html:htmlcov-api \
          --maxfail=3 \
          --tb=short \
          --timeout=600

    - name: Upload coverage reports
      uses: codecov/codecov-action@v4
      if: always()
      with:
        token: ${{ secrets.CODECOV_TOKEN || 'not-set' }}
        file: ./coverage-${{ matrix.test-type }}.xml
        flags: ${{ matrix.test-type }}
        name: codecov-${{ matrix.test-type }}
        fail_ci_if_error: false

    - name: Archive test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.test-type }}-${{ matrix.python-version }}
        path: |
          coverage-${{ matrix.test-type }}.xml
          htmlcov-${{ matrix.test-type }}/

  # Security and Dependency Scanning
  security:
    name: Security & Dependency Scan
    runs-on: ubuntu-latest
    needs: code-quality
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install safety bandit semgrep pip-audit

    - name: Dependency vulnerability scan (Safety)
      run: |
        safety check --json --output safety-report.json || true
        safety check --short-report

    - name: Advanced dependency audit (pip-audit)
      run: |
        pip-audit --format=json --output=pip-audit-report.json || true
        pip-audit --desc

    - name: SAST with Semgrep
      run: |
        semgrep --config=auto app/ --json --output=semgrep-report.json || true
        semgrep --config=auto app/ --severity=ERROR

    - name: Container security scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload security reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-reports
        path: |
          safety-report.json
          pip-audit-report.json
          semgrep-report.json
          trivy-results.sarif

    - name: Upload SARIF to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: trivy-results.sarif

  # Performance Testing
  performance:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: kreeda_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install locust

    - name: Set up test environment
      run: |
        cp .env.example .env
        echo "DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:5432/kreeda_test" >> .env
        echo "ENVIRONMENT=testing" >> .env

    - name: Start application
      run: |
        uvicorn app.main:app --host 0.0.0.0 --port 8000 &
        sleep 10
        curl -f http://localhost:8000/health

    - name: Run load tests
      run: |
        cd tests/performance
        locust -f locustfile.py --headless -u 10 -r 2 -t 60s --host=http://localhost:8000
      continue-on-error: true

    - name: Upload performance reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: performance-reports
        path: tests/performance/reports/

  # Build and Package
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.event_name == 'push'
    
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # Deploy to Render
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [build, performance]
    if: github.ref == 'refs/heads/production-config' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment: 
      name: production
      url: ${{ secrets.RENDER_APP_URL || 'https://kreeda-backend.render.com' }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to Render
      uses: johnbeynon/render-deploy-action@v0.0.8
      with:
        service-id: ${{ secrets.RENDER_SERVICE_ID || 'srv-default' }}
        api-key: ${{ secrets.RENDER_API_KEY || 'default' }}

    - name: Wait for deployment
      run: |
        echo "Waiting for deployment to complete..."
        sleep 60

    - name: Health Check
      run: |
        max_attempts=10
        attempt=1
        while [ $attempt -le $max_attempts ]; do
          if curl -f ${{ secrets.RENDER_APP_URL || 'https://kreeda-backend.render.com' }}/health; then
            echo "✅ Health check passed!"
            break
          else
            echo "❌ Health check failed, attempt $attempt/$max_attempts"
            if [ $attempt -eq $max_attempts ]; then
              echo "🚨 Deployment health check failed after $max_attempts attempts"
              exit 1
            fi
            sleep 30
            attempt=$((attempt + 1))
          fi
        done

    - name: Run smoke tests
      run: |
        curl -f ${{ secrets.RENDER_APP_URL || 'https://kreeda-backend.render.com' }}/api/v1/health || exit 1
        curl -f ${{ secrets.RENDER_APP_URL || 'https://kreeda-backend.render.com' }}/docs || exit 1

    - name: Notify deployment success
      if: success()
      run: |
        echo "✅ Deployment to Render successful!"
        echo "🚀 Application is live at: ${{ secrets.RENDER_APP_URL || 'https://kreeda-backend.render.com' }}"
        echo "📖 API docs available at: ${{ secrets.RENDER_APP_URL || 'https://kreeda-backend.render.com' }}/docs"

  # Post-deployment validation
  validate:
    name: Post-deployment Validation
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/production-config' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install test dependencies
      run: |
        pip install requests pytest

    - name: Run API validation tests
      run: |
        python -m pytest tests/smoke/ -v --tb=short
      env:
        API_BASE_URL: ${{ secrets.RENDER_APP_URL || 'https://kreeda-backend.render.com' }}

    - name: Update API documentation
      run: |
        echo "OpenAPI spec available at ${{ secrets.RENDER_APP_URL || 'https://kreeda-backend.render.com' }}/docs"
        curl -f ${{ secrets.RENDER_APP_URL || 'https://kreeda-backend.render.com' }}/openapi.json > openapi.json

    - name: Upload API documentation
      uses: actions/upload-artifact@v4
      with:
        name: api-documentation
        path: openapi.json
