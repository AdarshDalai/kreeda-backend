name: Dependency Updates

on:
  schedule:
    # Run every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-dependencies:
    name: Update Dependencies
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install pip-tools
      run: |
        python -m pip install --upgrade pip
        pip install pip-tools

    - name: Update requirements
      run: |
        # Update main requirements
        pip-compile --upgrade --output-file requirements.txt pyproject.toml
        
        # Update dev requirements
        pip-compile --upgrade --extra dev --output-file requirements-dev.txt pyproject.toml

    - name: Check for security vulnerabilities
      run: |
        pip install safety
        safety check -r requirements.txt || echo "Security issues found - will be addressed in PR"

    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: 'chore: update dependencies'
        title: 'chore: automated dependency updates'
        body: |
          ## 🔄 Automated Dependency Updates
          
          This PR contains automated updates to project dependencies.
          
          ### Changes
          - Updated Python package dependencies to latest compatible versions
          - Security vulnerabilities have been checked
          
          ### Review Checklist
          - [ ] All tests pass
          - [ ] No breaking changes introduced
          - [ ] Security scan results reviewed
          
          ### Auto-generated by GitHub Actions
          
          **Note**: This PR was automatically created by the dependency update workflow.
          Please review the changes and ensure all tests pass before merging.
        branch: automated/dependency-updates
        delete-branch: true
        labels: |
          dependencies
          automated
          maintenance