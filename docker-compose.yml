version: '3.8'

services:
  # Main application
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
      - DATABASE_URL=postgresql+asyncpg://kreeda:password@postgres:5432/kreeda_dev
      - REDIS_URL=redis://redis:6379
      - SUPABASE_URL=${SUPABASE_URL:-https://your-project.supabase.co}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-your-anon-key}
      - JWT_SECRET_KEY=development-secret-key
      - ALLOWED_ORIGINS=["http://localhost:3000", "http://localhost:8080"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./.env:/app/.env
      - ./app:/app/app:ro  # Mount source code for development
    networks:
      - kreeda-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # PostgreSQL database
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: kreeda_dev
      POSTGRES_USER: kreeda
      POSTGRES_PASSWORD: password
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - kreeda-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kreeda -d kreeda_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - kreeda-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  # Database migration runner
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    environment:
      - DATABASE_URL=postgresql+asyncpg://kreeda:password@postgres:5432/kreeda_dev
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kreeda-network
    command: alembic upgrade head
    profiles:
      - migrate

  # Test runner
  test:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    environment:
      - ENVIRONMENT=testing
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres-test:5432/kreeda_test
      - REDIS_URL=redis://redis-test:6379
    depends_on:
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
    volumes:
      - ./tests:/app/tests:ro
      - ./app:/app/app:ro
    networks:
      - test-network
    command: pytest tests/ -v --cov=app --cov-report=html --cov-report=term-missing
    profiles:
      - test

  # Test database
  postgres-test:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: kreeda_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    networks:
      - test-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kreeda_test"]
      interval: 5s
      timeout: 3s
      retries: 5
    profiles:
      - test

  # Test Redis
  redis-test:
    image: redis:7-alpine
    networks:
      - test-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    profiles:
      - test

  # Load testing with Locust
  locust:
    image: locustio/locust
    ports:
      - "8089:8089"
    volumes:
      - ./tests/performance:/mnt/locust
    command: -f /mnt/locust/locustfile.py --host=http://app:8000
    depends_on:
      - app
    networks:
      - kreeda-network
    profiles:
      - performance

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  kreeda-network:
    driver: bridge
  test-network:
    driver: bridge
